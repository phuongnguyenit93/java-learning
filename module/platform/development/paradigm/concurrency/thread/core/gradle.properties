# Define this is a module a not (To include in settings.gradle
IS_MICROSERVICE=TRUE

# Define name for this module. Use this name for task và many automation gradle
SERVICE_NAME=THREAD

# Include 3 value . APPLICATION for service have main method (Spring web) , LIBRARY for service not have main but have code java to config , PLATFORM for service not have code java , only config yml
MODULE_TYPE=APPLICATION

# Enable automatic build yml for module properties
BUILD_YML=TRUE
# Automation combine all yml at module and all component depend and save it in build file for run or docker compose
BUILD_YML_MODULE_DEPEND=SPRING_WEB,SPRING_SWAGGER

# Enable to inject task in file build-jar.gradle to each module enable it
BUILD_JAR=TRUE

# Enable to build readme.md file
BUILD_README=TRUE
# List language to automatic build readme.md in each language in each module
README_LANGUAGE=vi

# Enable auto build .env file and it's task related to (env.gradle) in task module
BUILD_ENV=TRUE

# Enable it to auto inject task list in file internal/info/module/task-list.json
INJECT_TASK_AUTO=TRUE


# Get all relative path and module path use for docker include module and store it in .env file in module
BUILD_ENV_PATH_MODULE_DEPEND=

# Build .env with profile (.env.loc,.env.dev.env.prd)
BUILD_ENV_PROFILE=FALSE

# Enable it to implement dependency and enable swagger it project (Still disable in product deploy)
BUILD_SWAGGER=TRUE

# List of language to describe API in swagger
BUILD_SWAGGER_LANGUAGE_LIST=vi,en