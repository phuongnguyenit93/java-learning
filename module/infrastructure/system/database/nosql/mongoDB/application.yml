# Nếu là file mẫu (file-based.yml) vui lòng không thêm cấu hình vào
# Nếu là các file application.yml tại module con , hãy thêm cấu hình phù hợp vào
---
# Cấu hình chung tại đây

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}

atlas:
  api:
    project-id: ${MONGODB_ATLAS_PROJECT_ID}
    public-key: ${MONGODB_ATLAS_PUBLIC_KEY}
    private-key: ${MONGODB_ATLAS_PRIVATE_KEY}

---
# Cấu hình cho profile DEV
spring:
  config:
    activate:
      on-profile: dev



---
# Cấu hình cho profile LOC
spring:
  config:
    activate:
      on-profile: loc



---
# Cấu hình cho profile PRD
spring:
  config:
    activate:
      on-profile: prd