# AUTO-GENERATED MERGED YAML
# You can check at module/microservice/module/service/inventory-service/src/main/resources/application.yml
# Source: INVENTORY_SERVICE
# Dependencies: SPRING_SWAGGER, SPRING_WEB, SPRING_ACTUATOR, DISTRIBUTED_TRACING

---
spring:
  config:
    activate:
      on-profile: dev
---
spring:
  config:
    activate:
      on-profile: loc
---
spring:
  config:
    activate:
      on-profile: prd
swagger:
  enabled: false
---
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/java-learning
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_MYSQL_URI}
    username: ${DATABASE_MYSQL_USER}
    password: ${DATABASE_MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: ${PROJECT_NAME:inventory-service}
  config:
    import: optional:configserver:http://admin:123456@localhost:8888/config-server/
  cloud:
    config:
      name: inventory-service
      uri: http://localhost:8888/config-server
      username: admin
      password: 123456
  jmx:
    enabled: true
swagger:
  enabled: ${BUILD_SWAGGER:}
springdoc:
  swagger-ui:
    enabled: ${swagger.enabled}
    docExpansion:
    - none
    path: /swagger-ui.html
  api-docs:
    enabled: ${swagger.enabled}
server:
  port: ${PORT:0}
  forward-headers-strategy: framework
  servlet:
    context-path: /${CONTEXT_PATH:inventory-service}
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true
    env:
      show-values: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
eureka:
  instance:
    status-page-url-path: ${server.servlet.context-path}/actuator/info
    health-check-url-path: ${server.servlet.context-path}/actuator/health
    metadata-map:
      management.context-path: ${server.servlet.context-path}/actuator
hawtio:
  authenticationEnabled: false
  springBootEndpointsExtension: true
logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %5p [%X{traceId:-}, %X{spanId:-}] --- [%thread]
      %-40.40logger{39} : %m%n'
