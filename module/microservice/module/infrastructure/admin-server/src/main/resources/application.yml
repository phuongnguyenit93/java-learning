# AUTO-GENERATED MERGED YAML
# You can check at module/microservice/module/infrastructure/admin-server/src/main/resources/application.yml
# Source: ADMIN_SERVER
# Dependencies: SPRING_WEB, SPRING_SWAGGER

---
eureka:
  instance:
    hostname: ${EUREKA_SERVER:localhost}
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_MYSQL_URI}
    username: ${DATABASE_MYSQL_USER}
    password: ${DATABASE_MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: ${PROJECT_NAME}
swagger:
  enabled: ${BUILD_SWAGGER:}
  enable-language-swagger: ${BUILD_SWAGGER_LANGUAGE}
  languages: ${BUILD_SWAGGER_LANGUAGE_LIST:}
springdoc:
  swagger-ui:
    enabled: ${swagger.enabled}
    path: /swagger-ui.html
    docExpansion:
    - none
  api-docs:
    enabled: ${swagger.enabled}
server:
  port: ${PORT}
  servlet:
    context-path: /${CONTEXT_PATH}
    session:
      cookie:
        name: ADMIN_SESSION_ID
---
spring:
  config:
    activate:
      on-profile: dev
---
spring:
  config:
    activate:
      on-profile: loc
---
spring:
  config:
    activate:
      on-profile: prd
swagger:
  enabled: false
