import com.github.javaparser.StaticJavaParser
import com.github.javaparser.ast.body.ClassOrInterfaceDeclaration
import org.yaml.snakeyaml.DumperOptions
import org.yaml.snakeyaml.Yaml

// Hàm hỗ trợ load data cũ
static def loadOldData(file, yaml) {
    def data = [:]
    if (file.exists()) {
        def old = yaml.load(file.text)
        if (old) data = old
    }
    return data
}


ext.generateApiSwaggerDescription = {
    if (project.findProperty("BUILD_SWAGGER") != "TRUE") {
        logger.lifecycle("SWAGGER không đc bật")
    }

    def langListString = project.findProperty("BUILD_SWAGGER_LANGUAGE_LIST")
    if (!langListString?.trim()) {
        logger.lifecycle("BUILD_SWAGGER_LANGUAGE_LIST trống")
    }

    def langList = langListString.split(",") as List

    def srcDir = file("src/main/java")
    def resourceDir = file("src/main/resources")
    if (!srcDir.exists()) return

    def moduleName = project.hasProperty("SERVICE_NAME") ? project["SERVICE_NAME"] : project.name
    def apiListInfo = [:] as HashMap <String,Object>
    def paramsListInfo = [] as Set

    // 1. Quét code Java
    srcDir.eachFileRecurse { file ->
        if (file.name.endsWith(".java")) {
            def javaFileParse = StaticJavaParser.parse(file)
            javaFileParse.findAll(ClassOrInterfaceDeclaration.class).each { classDefine ->
                def isController = classDefine.annotations.any { it.nameAsString.contains("Controller") }
                if (isController) {
                    def controllerName = classDefine.nameAsString
                    def relativePath = srcDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
                    def methodsList = [:]
                    classDefine.methods.each { method ->
                        def mappingAnnotation = method.annotations.find {
                            ["GetMapping", "PostMapping", "PutMapping", "DeleteMapping", "RequestMapping"].contains(it.nameAsString)
                        }
                        if (mappingAnnotation) {
                            // 2. Lấy nguyên văn Annotation dưới dạng String
                            // Ví dụ: @GetMapping("/api/test") hoặc @PostMapping(value = "/save", produces = "application/json")
                            def fullMapping = mappingAnnotation.toString()

                            methodsList[method.nameAsString] = [
                                    summary: "Chưa có tiêu đề",
                                    description: "Chưa có mô tả chi tiết",
                                    path: relativePath,
                                    mapping: fullMapping
                            ]
                            method.parameters.each { p -> paramsListInfo.add(p.nameAsString) }
                        }
                    }
                    if (!methodsList.isEmpty()) apiListInfo[controllerName] = methodsList
                }
            }
        }
    }

    def yaml = new Yaml()
    DumperOptions options = new DumperOptions()
    options.setDefaultFlowStyle(DumperOptions.FlowStyle.BLOCK)
    def dumper = new Yaml(options)

    langList.each {lang ->
        def swaggerDir = file("${resourceDir}/swagger/${lang}");
        if (!swaggerDir.exists()) swaggerDir.mkdirs()

        def apiFile = file("${swaggerDir}/api-descriptions.yml")
        if (!apiFile.exists()) apiFile.createNewFile()
        def finalApiData = loadOldData(apiFile, yaml)

        // --- 2. MERGE API Info ---
        apiListInfo.each {String controller, methods ->
            if (!finalApiData[controller]) finalApiData[controller] = [:]
            methods.each { methodName, meta ->
                if (!finalApiData[controller].containsKey(methodName)) {
                    finalApiData[controller][methodName] = meta
                } else {
                    // Nếu đã có, lọc bỏ summary và description từ meta mới
                    // Sau đó đè tất cả các thông số còn lại (path, mappingPath, v.v.) vào bản cũ
                    def updates = meta.findAll { key, value ->
                        !["summary", "description"].contains(key)
                    }

                    finalApiData[controller][methodName].putAll(updates)
                }
            }
        }
        apiFile.text = dumper.dump(finalApiData)

        // --- 3. MERGE PARAMS ---
        def paramsFile = file("${swaggerDir}/api-params.yml")
        if (!paramsFile.exists()) apiFile.createNewFile()
        def finalParamsData = loadOldData(paramsFile, yaml)

        paramsListInfo.each { paramName ->
            if (!finalParamsData.containsKey(paramName)) {
                // Cấu trúc mới cho Parameter
                finalParamsData[paramName] = [
                        summary: "Chưa có tiêu đề",
                        description: "Chưa có mô tả chi tiết"
                ]
            }
        }
        paramsFile.text = dumper.dump(finalParamsData)
    }

}

